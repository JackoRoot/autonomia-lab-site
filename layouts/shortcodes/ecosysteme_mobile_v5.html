
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&display=swap');
@keyframes flow1{to{stroke-dashoffset:-20}}
@keyframes flow2{to{stroke-dashoffset:-20}}
@keyframes flow3{to{stroke-dashoffset:-20}}
@keyframes flow4a{to{stroke-dashoffset:-20}}
@keyframes flow4b{to{stroke-dashoffset:-20}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:no-preference){
.f1{animation:flow1 2.4s linear infinite}
.f2{animation:flow2 3s linear infinite}
.f3{animation:flow3 2.8s linear infinite}
.f4a{animation:flow4a 2s linear infinite}
.f4b{animation:flow4b 2s linear infinite reverse}
.ring{transform-origin:190px 210px;animation:spin 20s linear infinite}
}
.silo{cursor:pointer}
.silo:hover .border{stroke:#F59E0B;stroke-width:2}
.silo rect.bg{transition:filter .2s}
.silo:hover rect.bg{filter:drop-shadow(0 2px 12px rgba(0,0,0,.08))}
</style>
<svg width="100%" viewBox="0 0 380 420" role="img">
<title>Écosystème Autonomia Lab</title>
<desc>4 silos interconnectés</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Grille fond -->
<circle cx="190" cy="210" r="62" fill="none" stroke="#E2E8F0" stroke-width="0.5"/>
<circle cx="190" cy="210" r="108" fill="none" stroke="#E2E8F0" stroke-width="0.5" opacity=".6"/>
<line x1="190" y1="20" x2="190" y2="400" stroke="#E2E8F0" stroke-width="0.5" opacity=".5"/>
<line x1="20" y1="210" x2="360" y2="210" stroke="#E2E8F0" stroke-width="0.5" opacity=".5"/>

<!-- 
  Centre 190,210 — cercle intérieur r=62, extérieur r=108
  Flèches à r=85 (milieu entre 62 et 108)
  Haut  : y = 210-85 = 125  arc x: 166→214
  Bas   : y = 210+85 = 295  arc x: 166→214
  Gauche: x = 190-85 = 105  arc y: 186→234
  Droite: x = 190+85 = 275  arc y: 186→234
-->

<!-- Solaire → Infrastructure (haut) -->
<path class="f1" d="M166 125 Q190 113 214 125" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr)" opacity=".65"/>

<!-- Solaire → Thermique (gauche) -->
<path class="f2" d="M105 186 Q93 210 105 234" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr)" opacity=".45"/>

<!-- Infrastructure → Hydraulique (droite) -->
<path class="f3" d="M275 234 Q287 210 275 186" fill="none" stroke="#10B981" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr)" opacity=".55"/>

<!-- Thermique ↔ Infrastructure (bas) -->
<path class="f4a" d="M166 295 Q190 307 214 295" fill="none" stroke="#BE123C" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr)" opacity=".55"/>
<path class="f4b" d="M214 303 Q190 315 166 303" fill="none" stroke="#BE123C" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arr)" opacity=".3"/>

<g class="ring">
  <circle cx="190" cy="210" r="36" fill="none" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3 6"/>
</g>
<circle cx="190" cy="210" r="30" fill="white" stroke="#F1F5F9" stroke-width="1.5"/>
<text x="190" y="214" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="600" fill="#1E293B" font-family="'Cormorant Garamond', serif" letter-spacing="0.5">Autonomia</text>
</svg>
