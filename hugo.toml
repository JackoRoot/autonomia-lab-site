baseURL = "https://autonomia-lab.fr/"
languageCode = "fr-FR"
title = "Autonomia Lab"
theme = "congo"
enableRobotsTXT = true
keepQuotes = true

[pagination]
  pagerSize = 10

[params]
  colorScheme = "custom"
  defaultAppearance = "light"
  autoSwitchAppearance = false
  enableSearch = true
  enableCodeCopy = true
  description = "Tests et comparatifs techniques — stations electriques, panneaux solaires, batteries LiFePO4"

[menu]
  [[menu.main]]
    name = "Stations electriques"
    url = "/categories/stations-electriques/"
    weight = 1
  [[menu.main]]
    name = "Panneaux solaires"
    url = "/categories/panneaux-solaires/"
    weight = 2
  [[menu.main]]
    name = "Batteries"
    url = "/categories/batteries/"
    weight = 3

[params.homepage]
  showRecent = true
  recentLimit = 10

[outputs]
  home = ["HTML"]

mainSections = ["top-5"]
