baseURL = "https://autonomia-lab.fr/"
languageCode = "fr-FR"
title = "Autonomia Lab"
theme = "hugo-book"
enableRobotsTXT = true

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[params]
  BookTheme        = "light"
  BookToC          = true
  BookSearch       = true
  BookRepo         = ""
  BookEditPath     = ""
  BookLogo         = ""
  BookMenuBundle   = ""
  BookSection      = "lab"
  BookDateFormat   = "02 Jan 2006"
  BookComments     = false
  BookPortableLinks = true
  description = "Documentation technique — Énergie, Eau, Thermique, Infrastructure"
  author = "Frank Vasseur"

[permalinks]
  lab = "/:slug/"

[menu]
  [[menu.before]]
    name = "Accueil"
    url  = "/"
    weight = 1

  [[menu.after]]
    name = "À propos"
    url  = "/a-propos/"
    weight = 1
